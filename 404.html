<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting... | フリー素材ポータル</title>
  <script>
    (function() {
      var oldBase = '/free-asset-portal';
      var newOrigin = 'https://freesozo.com';
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;

      // Strip old GitHub Pages base path if present
      if (path.indexOf(oldBase) === 0) {
        path = path.slice(oldBase.length) || '/';
      }

      var newUrl = newOrigin + path + search + hash;
      window.location.replace(newUrl);
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="https://freesozo.com/">https://freesozo.com/</a>...</p>
</body>
</html>
